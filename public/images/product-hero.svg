<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none" role="img" aria-label="Óculos inteligentes com câmera integrada">
  <defs>
    <radialGradient id="halo" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a44"/>
      <stop offset="45%" stop-color="#17171d"/>
      <stop offset="100%" stop-color="#0b0b10"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#243040"/>
      <stop offset="45%" stop-color="#101722"/>
      <stop offset="100%" stop-color="#05070c"/>
    </linearGradient>
    <linearGradient id="reflect" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c4b5fd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- brilho de fundo -->
  <ellipse cx="400" cy="240" rx="380" ry="210" fill="url(#halo)"/>

  <!-- hastes -->
  <path d="M96 178c-28 6-44 14-52 26 10 4 26 4 44 0l22-14Z" fill="url(#frame)"/>
  <path d="M704 178c28 6 44 14 52 26-10 4-26 4-44 0l-22-14Z" fill="url(#frame)"/>

  <!-- armação -->
  <path d="M100 168c60-16 150-22 204-10 22 5 42 5 64 0 20-4 44-4 64 0 22 5 42 5 64 0 54-12 144-6 204 10 14 4 16 10 12 22l-8 22c-4 10-10 14-22 12l-6-1c-4 44-32 92-102 96-74 4-116-40-128-96-8-14-24-14-32 0-12 56-54 100-128 96-70-4-98-52-102-96l-6 1c-12 2-18-2-22-12l-8-22c-4-12-2-18 12-22Z" fill="url(#frame)"/>

  <!-- lentes -->
  <path d="M148 196c40-10 96-12 138-4 26 5 38 20 36 46-4 50-38 78-96 76-56-2-84-34-90-78-3-22 0-35 12-40Z" fill="url(#lens)"/>
  <path d="M652 196c-40-10-96-12-138-4-26 5-38 20-36 46 4 50 38 78 96 76 56-2 84-34 90-78 3-22 0-35-12-40Z" fill="url(#lens)"/>

  <!-- reflexos nas lentes -->
  <path d="M170 208c30-8 70-10 100-5l-88 96c-16-10-26-26-30-46-3-20 2-40 18-45Z" fill="url(#reflect)" opacity="0.5"/>
  <path d="M630 208c-30-8-70-10-100-5l88 96c16-10 26-26 30-46 3-20-2-40-18-45Z" fill="url(#reflect)" opacity="0.35"/>

  <!-- ponte -->
  <rect x="376" y="196" width="48" height="14" rx="7" fill="#26262e"/>

  <!-- módulo de câmera -->
  <circle cx="140" cy="192" r="17" fill="#0b0b10"/>
  <circle cx="140" cy="192" r="12" fill="#101722"/>
  <circle cx="140" cy="192" r="7" fill="#1e3a5f"/>
  <circle cx="137" cy="189" r="2.4" fill="#7dd3fc"/>

  <!-- LED de status -->
  <circle cx="660" cy="192" r="5" fill="#34d399"/>
  <circle cx="660" cy="192" r="9" fill="#34d399" opacity="0.25"/>
</svg>
